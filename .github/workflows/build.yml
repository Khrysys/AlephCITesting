name: Aleph Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - staging

permissions: 
  contents: none

jobs:
  dependencies:
    runs-on: ${{ matrix.os }}
    name: Install Dependencies (${{ matrix.os }})
    permissions:
      contents: read
    concurrency:
      group: Dependencies-${{ matrix.os }}-default
      cancel-in-progress: false
    strategy:
      matrix:
        include:
          - os: windows-latest
      fail-fast: false
    
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
 
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Conan
        uses: ./.github/actions/setup-conan
        with: 
          cache-key: default

      - name: Install Dependencies
        shell: bash
        run: |-
          conan install \
            -b=missing \
            -s compiler.cppstd=20 \
            -s:a build_type=Release \
            --lockfile-out=conan.lock

      - name: Upload Lockfile Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-default.conan.lock
          path: conan.lock

  dependencies-linux:
    runs-on: ubuntu-latest
    name: Install Dependencies (ubuntu-latest, ${{ matrix.compiler }})
    permissions:
      contents: read
    concurrency:
      group: Dependencies-ubuntu-latest-${{ matrix.compiler }}-${{ github.ref }}
      cancel-in-progress: false
    strategy:
      matrix:
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
      fail-fast: false
    
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
 
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Ninja
        shell: bash
        run: sudo apt-get install -y ninja-build

      - name: Setup Conan
        uses: ./.github/actions/setup-conan
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        with: 
          cache-key: ${{ matrix.compiler }}

      - name: Install Dependencies
        shell: bash
        run: |-
          conan install -b=missing \
            -s compiler.cppstd=20 \
            -s:a build_type=Release \
            -c tools.cmake.cmaketoolchain:generator=Ninja \
            --lockfile-out=conan.lock 
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

      - name: Upload Lockfile Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-latest-${{ matrix.compiler }}.conan.lock
          path: conan.lock

  osv-scanner:
    runs-on: ubuntu-latest
    name: OSV Scanner
    needs: 
      - dependencies
      - dependencies-linux
    permissions:
      actions: read
      contents: read
      security-events: write
    concurrency:
      group: OSV-Scanner-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
 
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download Lockfile Artifact
        id: lockfile-download
        uses: actions/download-artifact@v7
        with:
          pattern: "*.conan.lock"

      - name: Merge Lockfiles
        shell: bash
        run: conan lock merge --lockfile ubuntu-latest-gcc.conan.lock --lockfile ubuntu-latest-clang.conan.lock --lockfile windows-latest-default.conan.lock --lockfile-out conan.lock

      - name: Run Scanner
        uses: google/osv-scanner-action/osv-scanner-action@8018483926dd235b3013d8c88023e644b9f8e09e # v2.3.3
        with:
          scan-args: >-
            --lockfile=conan.lock
            --lockfile=requirements.txt:docs/requirements.txt
            --lockfile=requirements.txt:.github/requirements/conan.txt
            --output=osv-scanner-results.json 
            --format=json

      - name: Run Reporter
        uses: google/osv-scanner-action/osv-reporter-action@8018483926dd235b3013d8c88023e644b9f8e09e # v2.3.3
        with: 
          scan-args: >-
            --output=osv-scanner-results.sarif 
            --new=osv-scanner-results.json 
            --gh-annotations=false 
            --fail-on-vuln=false 

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@cdefb33c0f6224e58673d9004f47f7cb3e328b89 # v4.31.10
        with:
          sarif_file: osv-scanner-results.sarif


  build:
    runs-on: ${{ matrix.os }}
    name: Build Aleph (${{ matrix.os }})
    needs:
      - dependencies
    permissions:
      contents: read
    concurrency:
      group: Build-${{ matrix.os }}-default-${{ github.ref }}
      cancel-in-progress: false
    strategy:
      matrix:
        include:
          - os: windows-latest
      fail-fast: false

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
 
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Conan
        uses: ./.github/actions/setup-conan
        with: 
          cache-key: default

      - name: Build Aleph
        shell: bash
        run: |
          conan build . \
            -s compiler.cppstd=20 \
            -s:a build_type=Release
    
  build-linux:
    runs-on: ubuntu-latest
    name: Build Aleph (ubuntu-latest, ${{ matrix.compiler }})
    needs:
      - dependencies-linux
    permissions:
      contents: read
    concurrency:
      group: Build-ubuntu-latest-${{ matrix.compiler }}-${{ github.ref }}
      cancel-in-progress: false
    strategy:
      matrix:
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
      fail-fast: false

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
 
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Ninja
        shell: bash
        run: sudo apt-get install -y ninja-build

      - name: Setup Conan
        uses: ./.github/actions/setup-conan
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        with: 
          cache-key: ${{ matrix.compiler }}

      - name: Build Aleph
        shell: bash
        run: |
          conan build . \
            -s compiler.cppstd=20 \
            -s:a build_type=Release \
            -c tools.cmake.cmaketoolchain:generator=Ninja \
            -c "tools.cmake.cmaketoolchain:extra_variables={'CMAKE_EXPORT_COMPILE_COMMANDS':True}"
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

      - name: Upload Build
        if: matrix.compiler == 'gcc'
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: build
    
  cpp-linter:
    name: C++ Linter
    runs-on: ubuntu-latest
    needs: 
      - build-linux
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Build
        id: download-artifact
        uses: actions/download-artifact@v7
        with:
          name: build

      - run: ls ${{ steps.download-artifact.outputs.download-path }}/Release

      - name: Run cpp-linter
        uses: cpp-linter/cpp-linter-action@24467985494bed9bfc398489b6ec12469beaf4da # v2.17.0
        id: linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          style: file
          extensions: 'c,h,cpp,hpp,inl'
          tidy-checks: 'cppcoreguidelines-*'
          version: '22'
          verbosity: 'info'
          files-changed-only: false
          thread-comments: false
          step-summary: true
          database: ${{ steps.download-artifact.outputs.download-path }}/Release
          tidy-review: true
          format-review: true

      - name: Fail if issues found
        if: steps.linter.outputs.checks-failed > 0
        run: exit 1

  clusterfuzzlite:
    name: ClusterFuzzLite (${{ matrix.mode }}, ${{ matrix.sanitizer }})
    if: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: ClusterFuzzLite-${{ matrix.mode }}-${{ matrix.sanitizer }}-${{ github.ref }}
      cancel-in-progress: false

    strategy:
      matrix:
        sanitizer: 
          - address
          - memory
          - undefined
        mode:
          - batch
          - prune
        include:
          - sanitizer: coverage
            mode: coverage
      fail-fast: true

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
        
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build ClusterFuzzLite
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ github.token }}
          language: c++
          sanitizer: ${{ matrix.sanitizer }}

      - name: Run ClusterFuzzLite
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ github.token }}
          fuzz-seconds: 600
          mode: ${{ matrix.mode }}
          sanitizer: ${{ matrix.sanitizer }}

  
  clusterfuzzlite-code-change:
    name: ClusterFuzzLite (code-change, ${{ matrix.sanitizer }})
    if: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: ClusterFuzzLite-code-change-${{ matrix.sanitizer }}-${{ github.ref }}
      cancel-in-progress: false

    strategy:
      matrix:
        sanitizer:
          - address
          - memory
          - undefined
      fail-fast: true

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
        
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build ClusterFuzzLite
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ github.token }}
          language: c++
          sanitizer: ${{ matrix.sanitizer }}

      - name: Run ClusterFuzzLite
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ github.token }}
          fuzz-seconds: 150
          mode: code-change
          sanitizer: ${{ matrix.sanitizer }}