name: Aleph Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - staging

permissions: 
  contents: none

jobs:
  dependencies:
    runs-on: ${{ matrix.os }}
    name: Install Dependencies (${{ matrix.os }})
    permissions:
      contents: read
    concurrency:
      group: Dependencies-${{ matrix.os }}-default
      cancel-in-progress: false
    strategy:
      matrix:
        include:
          - os: windows-latest
      fail-fast: false
    
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
 
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Conan
        uses: ./.github/actions/setup-conan
        with: 
          cache-key: default

      - name: Install Dependencies
        shell: bash
        run: |-
          conan install \
            -b=missing \
            -s compiler.cppstd=20 \
            -s:a build_type=Release \
            --lockfile-out=conan.lock

      - name: Upload Lockfile Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-default.conan.lock
          path: conan.lock

  dependencies-linux:
    runs-on: ubuntu-latest
    name: Install Dependencies (ubuntu-latest, ${{ matrix.compiler }})
    permissions:
      contents: read
    concurrency:
      group: Dependencies-ubuntu-latest-${{ matrix.compiler }}-${{ github.ref }}
      cancel-in-progress: false
    strategy:
      matrix:
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
      fail-fast: false
    
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
 
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Ninja
        shell: bash
        run: sudo apt-get install -y ninja-build

      - name: Setup Conan
        uses: ./.github/actions/setup-conan
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        with: 
          cache-key: ${{ matrix.compiler }}

      - name: Install Dependencies
        shell: bash
        run: |-
          conan install -b=missing \
            -s compiler.cppstd=20 \
            -s:a build_type=Release \
            -c tools.cmake.cmaketoolchain:generator=Ninja \
            --lockfile-out=conan.lock 
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

      - name: Upload Lockfile Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-latest-${{ matrix.compiler }}.conan.lock
          path: conan.lock

  osv-scanner:
    runs-on: ubuntu-latest
    name: OSV Scanner
    needs: 
      - dependencies
      - dependencies-linux
    permissions:
      actions: read
      contents: read
      security-events: write
    concurrency:
      group: OSV-Scanner-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
 
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Conan
        uses: ./.github/actions/setup-conan

      - name: Download Lockfiles
        uses: actions/download-artifact@v7
        with:
          pattern: '*.conan.lock'
          merge-multiple: true
          path: ${{ github.workspace }}

      - run: ls -R ${{ steps.lockfile-download.outputs.download-path }}

      - name: Merge Lockfiles
        shell: bash
        run: >-
          conan lock merge 
          --lockfile ${{ steps.lockfile-download.outputs.download-path }}/ubuntu-latest-gcc.conan.lock 
          --lockfile ${{ steps.lockfile-download.outputs.download-path }}/ubuntu-latest-clang.conan.lock 
          --lockfile ${{ steps.lockfile-download.outputs.download-path }}/windows-latest-default.conan.lock 
          --lockfile-out conan.lock

  build:
    runs-on: ${{ matrix.os }}
    name: Build Aleph (${{ matrix.os }})
    needs:
      - dependencies
    permissions:
      contents: read
    concurrency:
      group: Build-${{ matrix.os }}-default-${{ github.ref }}
      cancel-in-progress: false
    strategy:
      matrix:
        include:
          - os: windows-latest
      fail-fast: false

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
 
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Conan
        uses: ./.github/actions/setup-conan
        with: 
          cache-key: default

      - name: Build Aleph
        shell: bash
        run: |
          conan build . \
            -s compiler.cppstd=20 \
            -s:a build_type=Release
    
  build-linux:
    runs-on: ubuntu-latest
    name: Build Aleph (ubuntu-latest, ${{ matrix.compiler }})
    needs:
      - dependencies-linux
    permissions:
      contents: read
    concurrency:
      group: Build-ubuntu-latest-${{ matrix.compiler }}-${{ github.ref }}
      cancel-in-progress: false
    strategy:
      matrix:
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
      fail-fast: false

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
 
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Ninja
        shell: bash
        run: sudo apt-get install -y ninja-build

      - name: Setup Conan
        uses: ./.github/actions/setup-conan
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        with: 
          cache-key: ${{ matrix.compiler }}

      - name: Build Aleph
        shell: bash
        run: |
          conan build . \
            -s compiler.cppstd=20 \
            -s:a build_type=Release \
            -c tools.cmake.cmaketoolchain:generator=Ninja \
            -c "tools.cmake.cmaketoolchain:extra_variables={'CMAKE_EXPORT_COMPILE_COMMANDS':True}"
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

      - name: Upload Build
        if: matrix.compiler == 'gcc'
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: build
    
  cpp-linter:
    name: C++ Linter
    runs-on: ubuntu-latest
    needs: 
      - build-linux
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Conan
        uses: ./.github/actions/setup-conan
        with: 
          cache-key: gcc
        
      - name: Download Build
        id: download-artifact
        uses: actions/download-artifact@v7
        with:
          name: build
          path: build

      - name: Run cpp-linter
        uses: cpp-linter/cpp-linter-action@24467985494bed9bfc398489b6ec12469beaf4da # v2.17.0
        id: linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          style: file
          extensions: 'c,h,cpp,hpp,inl'
          tidy-checks: 'cppcoreguidelines-*'
          version: '22'
          verbosity: 'info'
          files-changed-only: false
          thread-comments: false
          step-summary: true
          database: ${{ steps.download-artifact.outputs.download-path }}/build/Release
          ignore: .github|build
          ignore-tidy: .github|build
          ignore-format: .github|build
          tidy-review: true
          format-review: true

      - name: Fail if issues found
        if: steps.linter.outputs.checks-failed > 0
        run: exit 1

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    needs: 
      - dependencies-linux
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
 
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: c-cpp
            build-mode: manual
          - language: python
            build-mode: none
 
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
 
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Conan
        if: matrix.language == 'c-cpp'
        uses: ./.github/actions/setup-conan
        with:
          cache-key: gcc

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0c0c5dc2f136b98cb0537075ccfa21f94cd9a63e # v2.24.3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Run manual build steps
        if: matrix.build-mode == 'manual'
        shell: bash
        run: >-
          conan build 
          -s compiler.cppstd=20
          -c tools.build:skip_test=true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@0c0c5dc2f136b98cb0537075ccfa21f94cd9a63e # v2.24.3
        with:
          category: "/language:${{matrix.language}}"