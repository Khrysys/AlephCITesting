name: Aleph Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - staging
  schedule:
    - cron: '45 5 * * *'

permissions: 
  contents: none

jobs:
  dependencies:
    runs-on: ${{ matrix.os }}
    name: Install Dependencies (${{ matrix.os }})
    permissions:
      contents: read
    concurrency:
      group: Dependencies-${{ matrix.os }}-default
      cancel-in-progress: false
    strategy:
      matrix:
        include:
          - os: windows-latest
      fail-fast: false
    
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
 
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Conan
        uses: ./.github/actions/setup-conan
        with: 
          cache-key: default

      - name: Install Dependencies
        shell: bash
        run: |
          conan install \
            -b=missing \
            -s compiler.cppstd=20 \
            -s:a build_type=Release \
            --lockfile-out=${{ github.workspace }}/conan.lock

      - name: Upload Lockfile Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-default.conan.lock
          path: ${{ github.workspace }}/conan.lock

  dependencies-linux:
    runs-on: ubuntu-latest
    name: Install Dependencies (ubuntu-latest, ${{ matrix.compiler }})
    permissions:
      contents: read
    concurrency:
      group: Dependencies-ubuntu-latest-${{ matrix.compiler }}-${{ github.ref }}
      cancel-in-progress: false
    strategy:
      matrix:
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
      fail-fast: false
    
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
 
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Ninja
        shell: bash
        run: sudo apt-get install -y ninja-build

      - name: Setup Conan
        uses: ./.github/actions/setup-conan
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        with: 
          cache-key: ${{ matrix.compiler }}

      - name: Install Dependencies
        shell: bash
        run: |
          conan install -b=missing \
            -s compiler.cppstd=20 \
            -s:a build_type=Release \
            -c tools.cmake.cmaketoolchain:generator=Ninja \
            --lockfile-out=${{ github.workspace }}/conan.lock
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

      - name: Upload Lockfile Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-latest-${{ matrix.compiler }}.conan.lock
          path: ${{ github.workspace }}/conan.lock

  osv-scanner:
    runs-on: ubuntu-latest
    name: OSV Scanner
    needs: 
      - dependencies
      - dependencies-linux
    permissions:
      actions: read
      contents: read
      security-events: write
    concurrency:
      group: OSV-Scanner-${{matrix.source_os}}-${{ matrix.compiler }}-${{ github.ref }}
      cancel-in-progress: false
    strategy:
      matrix:
        include:
          - source_os: ubuntu-latest
            compiler: gcc
          - source_os: ubuntu-latest
            compiler: clang
          - source_os: windows-latest
            compiler: default
          - source_os: source
      fail-fast: false

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
 
      - name: Checkout
        if: matrix.source_os == 'source'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download Lockfile Artifact
        if: matrix.source_os != 'source'
        id: lockfile-download
        uses: actions/download-artifact@v7
        with:
          pattern: "*-*.conan.lock"
          path: ${{ github.workspace }}

      - name: Print directory
        shell: bash
        run: |
          ls ${{ steps.lockfile-download.outputs.download-path }}


  build:
    runs-on: ${{ matrix.os }}
    name: Build Aleph (${{ matrix.os }})
    needs:
      - dependencies
    permissions:
      contents: read
    concurrency:
      group: Build-${{ matrix.os }}-default-${{ github.ref }}
      cancel-in-progress: false
    strategy:
      matrix:
        include:
          - os: windows-latest
      fail-fast: false

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
 
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Conan
        uses: ./.github/actions/setup-conan
        with: 
          cache-key: default

      - name: Build Aleph
        shell: bash
        run: |
          conan build . \
            -s compiler.cppstd=20 \
            -s:a build_type=Release
    
  build-linux:
    runs-on: ubuntu-latest
    name: Build Aleph (ubuntu-latest, ${{ matrix.compiler }})
    needs:
      - dependencies-linux
    permissions:
      contents: read
    concurrency:
      group: Build-ubuntu-latest-${{ matrix.compiler }}-${{ github.ref }}
      cancel-in-progress: false
    strategy:
      matrix:
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
      fail-fast: false

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
 
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Ninja
        shell: bash
        run: sudo apt-get install -y ninja-build

      - name: Setup Conan
        uses: ./.github/actions/setup-conan
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        with: 
          cache-key: ${{ matrix.compiler }}

      - name: Build Aleph
        shell: bash
        run: |
          conan build . \
            -s compiler.cppstd=20 \
            -s:a build_type=Release \
            -c tools.cmake.cmaketoolchain:generator=Ninja \
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
    
